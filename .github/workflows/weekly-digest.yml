name: Weekly FluidStack Digest

on:
  schedule:
    # Every Friday at 9am Pacific (4pm UTC)
    - cron: '0 16 1 * *'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-digest.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add public/news.json
          git diff --staged --quiet || (git commit -m "Weekly digest: $(date +%Y-%m-%d)" && git push)
